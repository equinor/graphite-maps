name: Build and test Linux

on:
 push:
   branches:
     - main
   tags: "*"
 pull_request:

env:
  UV_FROZEN: true         # https://docs.astral.sh/uv/configuration/environment/#uv_frozen

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-wheels-linux:
    name: Build 🛞
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set IS_TAG environment variable
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: build-wheels-linux
        uses: docker://quay.io/pypa/manylinux_2_28_x86_64
        env:
          IS_TAG: ${{ env.IS_TAG }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

        with:
          entrypoint: /bin/bash
          args: '-c "sh wheel_build_scripts/build_wheels_linux.sh"'

      - name: Upload wheel as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Python ${{ matrix.python-version }} wheel
          path: |
            graphite*.whl

  test-linux:
    needs: [build-wheels-linux]
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Download wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "Python ${{ matrix.python-version }} wheel"
      - name: Install wheel
        run: |
          # Find the downloaded wheel file
          wheel_file=$(find . -name "graphite*.whl" -print -quit)

          echo "Found wheel file @ $wheel_file"

          # Install the wheel
          pip install "$wheel_file"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run EnIF unit tests
        run: |
          python -m pip install pytest
          pytest

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels-linux, test-linux]
    environment: pypi
    permissions:
      id-token: write

    # If this is a tagged release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    steps:
      - name: Get wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Move to dist/
        run: |
          mkdir dist
          find artifacts -name "*.whl" -exec mv '{}' dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
